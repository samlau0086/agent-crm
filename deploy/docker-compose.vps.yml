services:
  web:
    image: ${CRM_IMAGE:?Set CRM_IMAGE}
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      APP_BASE_URL: ${APP_BASE_URL:?Set APP_BASE_URL}
      ALLOW_INSECURE_APP_BASE_URL: ${ALLOW_INSECURE_APP_BASE_URL:-false}
      REDIS_URL: redis://redis:6379
      JOB_EXECUTOR: redis
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-crm:jobs}
      JOB_DEAD_LETTER_QUEUE_NAME: ${JOB_DEAD_LETTER_QUEUE_NAME:-crm:jobs:dead}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-10000}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-live}
      EMAIL_SEND_CLAIM_TIMEOUT_MS: ${EMAIL_SEND_CLAIM_TIMEOUT_MS:-900000}
      MAIL_CONNECT_TIMEOUT_MS: ${MAIL_CONNECT_TIMEOUT_MS:-15000}
      MAIL_RESPONSE_TIMEOUT_MS: ${MAIL_RESPONSE_TIMEOUT_MS:-30000}
      MAIL_FETCH_RESPONSE_TIMEOUT_MS: ${MAIL_FETCH_RESPONSE_TIMEOUT_MS:-60000}
      MAIL_IMAP_FETCH_BYTES: ${MAIL_IMAP_FETCH_BYTES:-262144}
      EMAIL_CONFIG_SECRET: ${EMAIL_CONFIG_SECRET:?Set EMAIL_CONFIG_SECRET}
      EMAIL_OAUTH_STATE_SECRET: ${EMAIL_OAUTH_STATE_SECRET:?Set EMAIL_OAUTH_STATE_SECRET}
      DISCUSSION_STORAGE_ENDPOINT: ${DISCUSSION_STORAGE_ENDPOINT:?Set DISCUSSION_STORAGE_ENDPOINT}
      DISCUSSION_STORAGE_REGION: ${DISCUSSION_STORAGE_REGION:-us-east-1}
      DISCUSSION_STORAGE_BUCKET: ${DISCUSSION_STORAGE_BUCKET:?Set DISCUSSION_STORAGE_BUCKET}
      DISCUSSION_STORAGE_ACCESS_KEY: ${DISCUSSION_STORAGE_ACCESS_KEY:?Set DISCUSSION_STORAGE_ACCESS_KEY}
      DISCUSSION_STORAGE_SECRET_KEY: ${DISCUSSION_STORAGE_SECRET_KEY:?Set DISCUSSION_STORAGE_SECRET_KEY}
      DISCUSSION_STORAGE_FORCE_PATH_STYLE: ${DISCUSSION_STORAGE_FORCE_PATH_STYLE:-true}
      EMAIL_VERIFY_USER_ID: ${EMAIL_VERIFY_USER_ID:-user-admin}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_AUTH_URL: ${GMAIL_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      GMAIL_OAUTH_TOKEN_URL: ${GMAIL_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GMAIL_OAUTH_SCOPE: ${GMAIL_OAUTH_SCOPE:-https://mail.google.com/}
      OUTLOOK_OAUTH_CLIENT_ID: ${OUTLOOK_OAUTH_CLIENT_ID:-}
      OUTLOOK_OAUTH_CLIENT_SECRET: ${OUTLOOK_OAUTH_CLIENT_SECRET:-}
      OUTLOOK_OAUTH_AUTH_URL: ${OUTLOOK_OAUTH_AUTH_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/authorize}
      OUTLOOK_OAUTH_TOKEN_URL: ${OUTLOOK_OAUTH_TOKEN_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/token}
      OUTLOOK_OAUTH_SCOPE: ${OUTLOOK_OAUTH_SCOPE:-https://graph.microsoft.com/Mail.ReadWrite https://graph.microsoft.com/Mail.Send offline_access}
      WAIT_FOR_DATABASE: "true"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      SEED_ON_EMPTY: ${SEED_ON_EMPTY:-false}
      DB_WAIT_TIMEOUT_MS: ${DB_WAIT_TIMEOUT_MS:-90000}
      BACKUP_DIR: /app/backups
      DB_MAINTENANCE_MODE: direct
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ${CRM_DATA_DIR:-/opt/ai-agent-crm}/backups:/app/backups
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  worker:
    image: ${CRM_IMAGE:?Set CRM_IMAGE}
    entrypoint: ["sh", "scripts/docker-worker-entrypoint.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      APP_BASE_URL: ${APP_BASE_URL:?Set APP_BASE_URL}
      ALLOW_INSECURE_APP_BASE_URL: ${ALLOW_INSECURE_APP_BASE_URL:-false}
      REDIS_URL: redis://redis:6379
      JOB_EXECUTOR: redis
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-crm:jobs}
      JOB_DEAD_LETTER_QUEUE_NAME: ${JOB_DEAD_LETTER_QUEUE_NAME:-crm:jobs:dead}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      JOB_WORKER_POLL_MS: ${JOB_WORKER_POLL_MS:-2000}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-10000}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-live}
      EMAIL_SEND_CLAIM_TIMEOUT_MS: ${EMAIL_SEND_CLAIM_TIMEOUT_MS:-900000}
      MAIL_CONNECT_TIMEOUT_MS: ${MAIL_CONNECT_TIMEOUT_MS:-15000}
      MAIL_RESPONSE_TIMEOUT_MS: ${MAIL_RESPONSE_TIMEOUT_MS:-30000}
      MAIL_FETCH_RESPONSE_TIMEOUT_MS: ${MAIL_FETCH_RESPONSE_TIMEOUT_MS:-60000}
      MAIL_IMAP_FETCH_BYTES: ${MAIL_IMAP_FETCH_BYTES:-262144}
      EMAIL_CONFIG_SECRET: ${EMAIL_CONFIG_SECRET:?Set EMAIL_CONFIG_SECRET}
      EMAIL_OAUTH_STATE_SECRET: ${EMAIL_OAUTH_STATE_SECRET:?Set EMAIL_OAUTH_STATE_SECRET}
      EMAIL_VERIFY_USER_ID: ${EMAIL_VERIFY_USER_ID:-user-admin}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_AUTH_URL: ${GMAIL_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      GMAIL_OAUTH_TOKEN_URL: ${GMAIL_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GMAIL_OAUTH_SCOPE: ${GMAIL_OAUTH_SCOPE:-https://mail.google.com/}
      OUTLOOK_OAUTH_CLIENT_ID: ${OUTLOOK_OAUTH_CLIENT_ID:-}
      OUTLOOK_OAUTH_CLIENT_SECRET: ${OUTLOOK_OAUTH_CLIENT_SECRET:-}
      OUTLOOK_OAUTH_AUTH_URL: ${OUTLOOK_OAUTH_AUTH_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/authorize}
      OUTLOOK_OAUTH_TOKEN_URL: ${OUTLOOK_OAUTH_TOKEN_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/token}
      OUTLOOK_OAUTH_SCOPE: ${OUTLOOK_OAUTH_SCOPE:-https://graph.microsoft.com/Mail.ReadWrite https://graph.microsoft.com/Mail.Send offline_access}
      WAIT_FOR_DATABASE: "true"
      DB_WAIT_TIMEOUT_MS: ${DB_WAIT_TIMEOUT_MS:-90000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  email-sync:
    image: ${CRM_IMAGE:?Set CRM_IMAGE}
    entrypoint: ["sh", "scripts/docker-email-sync-entrypoint.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      APP_BASE_URL: ${APP_BASE_URL:?Set APP_BASE_URL}
      ALLOW_INSECURE_APP_BASE_URL: ${ALLOW_INSECURE_APP_BASE_URL:-false}
      REDIS_URL: redis://redis:6379
      JOB_EXECUTOR: redis
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-crm:jobs}
      JOB_DEAD_LETTER_QUEUE_NAME: ${JOB_DEAD_LETTER_QUEUE_NAME:-crm:jobs:dead}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      EMAIL_SYNC_INTERVAL_MS: ${EMAIL_SYNC_INTERVAL_MS:-300000}
      EMAIL_SYNC_LIMIT: ${EMAIL_SYNC_LIMIT:-25}
      EMAIL_SYNC_USER_ID: ${EMAIL_SYNC_USER_ID:-user-admin}
      EMAIL_SYNC_JOB_TIMEOUT_MS: ${EMAIL_SYNC_JOB_TIMEOUT_MS:-540000}
      EMAIL_SEND_CLAIM_TIMEOUT_MS: ${EMAIL_SEND_CLAIM_TIMEOUT_MS:-900000}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-10000}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-live}
      MAIL_CONNECT_TIMEOUT_MS: ${MAIL_CONNECT_TIMEOUT_MS:-15000}
      MAIL_RESPONSE_TIMEOUT_MS: ${MAIL_RESPONSE_TIMEOUT_MS:-30000}
      MAIL_FETCH_RESPONSE_TIMEOUT_MS: ${MAIL_FETCH_RESPONSE_TIMEOUT_MS:-60000}
      MAIL_IMAP_FETCH_BYTES: ${MAIL_IMAP_FETCH_BYTES:-262144}
      EMAIL_CONFIG_SECRET: ${EMAIL_CONFIG_SECRET:?Set EMAIL_CONFIG_SECRET}
      EMAIL_OAUTH_STATE_SECRET: ${EMAIL_OAUTH_STATE_SECRET:?Set EMAIL_OAUTH_STATE_SECRET}
      EMAIL_VERIFY_USER_ID: ${EMAIL_VERIFY_USER_ID:-user-admin}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_AUTH_URL: ${GMAIL_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      GMAIL_OAUTH_TOKEN_URL: ${GMAIL_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GMAIL_OAUTH_SCOPE: ${GMAIL_OAUTH_SCOPE:-https://mail.google.com/}
      OUTLOOK_OAUTH_CLIENT_ID: ${OUTLOOK_OAUTH_CLIENT_ID:-}
      OUTLOOK_OAUTH_CLIENT_SECRET: ${OUTLOOK_OAUTH_CLIENT_SECRET:-}
      OUTLOOK_OAUTH_AUTH_URL: ${OUTLOOK_OAUTH_AUTH_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/authorize}
      OUTLOOK_OAUTH_TOKEN_URL: ${OUTLOOK_OAUTH_TOKEN_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/token}
      OUTLOOK_OAUTH_SCOPE: ${OUTLOOK_OAUTH_SCOPE:-https://graph.microsoft.com/Mail.ReadWrite https://graph.microsoft.com/Mail.Send offline_access}
      WAIT_FOR_DATABASE: "true"
      DB_WAIT_TIMEOUT_MS: ${DB_WAIT_TIMEOUT_MS:-90000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${CRM_DATA_DIR:-/opt/ai-agent-crm}/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - log_min_duration_statement=500
      - -c
      - log_lock_waits=on
      - -c
      - deadlock_timeout=1s
      - -c
      - log_temp_files=10485760
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - ${CRM_DATA_DIR:-/opt/ai-agent-crm}/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 24
    restart: unless-stopped
